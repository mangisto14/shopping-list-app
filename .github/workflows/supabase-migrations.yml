name: Supabase Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
  push:
    branches:
      - main
      - develop
    paths:
      - "supabase/migrations/**"

# Avoid two migration runs applying concurrently if pushes land close
# together - queue behind the in-flight run rather than cancel it,
# since cancelling mid-`db push` could leave a database half-migrated.
# One shared group across both branches is intentional: main and
# develop target different projects, but serializing every run (rather
# than letting a main and a develop run race each other) keeps this
# workflow's own step-summary/log ordering simple and costs nothing -
# these deploys are infrequent, not latency-sensitive.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Runs on every PR that touches migrations, and again on push to
  # main. Applies every migration file from scratch against a throwaway
  # local Supabase stack (Postgres + GoTrue + PostgREST via Docker, no
  # secrets needed) - this is what actually gates a PR: a migration
  # with a SQL error, a bad ordering assumption, or a non-idempotent
  # statement fails here before it ever reaches main, not after.
  validate:
    name: Validate migrations (local stack)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List migration files
        run: |
          echo "### Migration files in this run" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in supabase/migrations/*.sql; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done
          ls -1 supabase/migrations/

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        id: start
        run: supabase start

      - name: Apply all migrations from scratch (db reset)
        id: reset
        run: supabase db reset

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup

      - name: Validation summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Local stack start | ${{ steps.start.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Apply migrations (db reset) | ${{ steps.reset.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

  # Only runs on push to main, and only after validate succeeds -
  # applies the same, already-validated migrations to the production
  # project. This job was previously named `deploy` and was the only
  # deploy target in this workflow - renamed to `deploy-production` now
  # that `deploy-development` (below) exists as its develop-branch
  # counterpart, so job names make the main/develop split explicit
  # instead of leaving "deploy" ambiguous about which environment it
  # means.
  deploy-production:
    name: Apply Supabase migrations (production)
    runs-on: ubuntu-latest
    needs: validate
    # Belt-and-suspenders: the push/branches trigger above already
    # restricts this to main, but this explicit guard is a second,
    # independent safety net against ever running on a pull_request
    # event or any branch other than main if the trigger config above
    # is ever loosened by mistake.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List detected migration files
        run: |
          echo "Migration files changed in this push:"
          git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}" -- supabase/migrations/ \
            || echo "(no previous commit to diff against - listing all current migration files instead)"
          ls -1 supabase/migrations/

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Must run before any command that touches the remote project -
      # `migration list --linked` and `db push` below both operate on
      # whatever project this links to. SUPABASE_DB_PASSWORD is required
      # here too (not just for db push): `link` itself opens a connection
      # to verify the database is reachable, and without a password in a
      # non-interactive CI shell it would hang waiting on a prompt.
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # `supabase migration list` has no --project-ref flag - it only
      # accepts --linked (diff against the project linked above),
      # --local, or --db-url. Surfacing the local-vs-remote migration
      # diff here, before db push applies it, means a reviewer can see
      # exactly what's about to change in the log.
      - name: Validate migrations against linked project
        run: supabase migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        id: push
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Migration summary
        if: always()
        run: |
          echo "## Supabase Migration Deploy (production)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Applied migrations:" >> "$GITHUB_STEP_SUMMARY"
          for f in supabase/migrations/*.sql; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**db push:** ${{ steps.push.outcome }}" >> "$GITHUB_STEP_SUMMARY"

  # develop-branch counterpart to deploy-production, targeting a
  # SEPARATE Supabase project via its own secrets - never the same
  # project `main` deploys to. This is deliberately a distinct secret
  # namespace (SUPABASE_DEV_*, not SUPABASE_*) rather than reusing the
  # production secrets: if the development project/secrets haven't
  # been created yet, `supabase link` below fails cleanly on a missing/
  # invalid project ref, which is a safe failure - it can never fall
  # through to silently deploying develop's migrations into production.
  #
  # SUPABASE_ACCESS_TOKEN is reused as-is: it authenticates the CLI to
  # your Supabase account, not to a specific project, so the same token
  # works for both jobs. Only the project-ref and DB password differ
  # per project.
  deploy-development:
    name: Apply Supabase migrations (development)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List detected migration files
        run: |
          echo "Migration files changed in this push:"
          git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}" -- supabase/migrations/ \
            || echo "(no previous commit to diff against - listing all current migration files instead)"
          ls -1 supabase/migrations/

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project (development)
        run: supabase link --project-ref "$SUPABASE_DEV_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DEV_PROJECT_ID: ${{ secrets.SUPABASE_DEV_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}

      - name: Validate migrations against linked project
        run: supabase migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}

      - name: Apply migrations
        id: push
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}

      - name: Migration summary
        if: always()
        run: |
          echo "## Supabase Migration Deploy (development)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Applied migrations:" >> "$GITHUB_STEP_SUMMARY"
          for f in supabase/migrations/*.sql; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**db push:** ${{ steps.push.outcome }}" >> "$GITHUB_STEP_SUMMARY"
